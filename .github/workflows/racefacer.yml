name: RaceFacer sync

# GitHub's half-hourly crons get skipped a lot, which is why the sync kept stalling.
# Instead this fires every 2 HOURS (low-frequency crons are honoured far more
# reliably) and each run then LOOPS inside the job for ~1h50m. Each loop does a
# QUICK status-only refresh; every HEAVY_INTERVAL_SEC it does a FULL sync
# (repairs, parts, notes, prune). Because the run is long, it completes several
# full passes, so EVERY kart's notes get pulled in and stay current. Runs chain
# back-to-back for near-continuous coverage. The "Run workflow" button starts it now.
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

# Never let two of these run on top of each other.
concurrency:
  group: racefacer-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Get the files from the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install the libraries it needs
        run: npm install undici cheerio

      - name: Sync on a loop (Sydney)
        env:
          RF_USER: ${{ secrets.RF_USER }}
          RF_PASS: ${{ secrets.RF_PASS }}
          SB_URL: ${{ secrets.SB_URL }}
          SB_SERVICE_KEY: ${{ secrets.SB_SERVICE_KEY }}
          SITE: sydney
          GAP_SECONDS: '5'           # <-- gap between cycles. Fast pass now reads ~5 list pages, so this can be low. Raise if RaceFacer gets slow.
          HEAVY_INTERVAL_SEC: '600'  # <-- full sync (repairs/parts/notes) runs at most this often. 600 = every 10 min.
        run: |
          # Keep the job alive ~1h50m. Allow the heavier FULL sync to START only in the first
          # ~90 min; after that, force status-only cycles so a full sync can never overrun the
          # job timeout. Over ~90 min the loop completes several full passes, so every kart's
          # notes/repairs/parts get pulled in. The next run (2h cron) keeps it going.
          end=$(( SECONDS + 6600 ))
          heavy_until=$(( SECONDS + 5400 ))
          while [ $SECONDS -lt $end ]; do
            if [ $SECONDS -lt $heavy_until ]; then
              node racefacer-sync.js || echo "sync cycle failed — will retry next loop"
            else
              HEAVY_INTERVAL_SEC=999999 node racefacer-sync.js || echo "status cycle failed — will retry next loop"
            fi
            sleep "${GAP_SECONDS}"
          done
