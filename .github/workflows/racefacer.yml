name: RaceFacer sync

# Runs the sync automatically every 1 minute (GitHub's fastest),
# and also gives you a "Run workflow" button to test it by hand.
on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get the files from the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install the one library it needs
        run: npm install undici

      - name: Run the sync (Sydney)
        env:
          RF_USER: ${{ secrets.RF_USER }}
          RF_PASS: ${{ secrets.RF_PASS }}
          SB_URL: ${{ secrets.SB_URL }}
          SB_SERVICE_KEY: ${{ secrets.SB_SERVICE_KEY }}
          SITE: sydney
        run: node racefacer-sync.js

# Want Melbourne too? Copy the "Run the sync (Sydney)" step, paste it
# below, rename it "Run the sync (Melbourne)", and change SITE to melbourne.
