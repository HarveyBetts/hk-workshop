<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HK Inventory">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>HK Inventory</title>
  <script type="module">
    import QrScanner from 'https://unpkg.com/qr-scanner/qr-scanner.min.js';
    window.QrScanner = QrScanner;
  </script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; background:#000; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; color:#fff; overflow:hidden; }
    .app { display:flex; flex-direction:column; padding:max(env(safe-area-inset-top),20px) 20px max(env(safe-area-inset-bottom),20px); overflow:hidden; }
    .header { display:flex; flex-direction:column; align-items:center; padding:8px 0 16px; }
    .logo-circle { width:60px; height:60px; border-radius:50%; border:3px solid transparent; background:linear-gradient(#000,#000) padding-box,linear-gradient(135deg,#00e5ff,#7b2fff,#e040fb) border-box; display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
    .logo-text { font-size:20px; font-weight:900; letter-spacing:2px; background:linear-gradient(135deg,#00e5ff,#e040fb); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .brand { font-size:10px; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:3px; }
    .page { display:none; flex:1; flex-direction:column; overflow-y:auto; min-height:0; }
    .page.active { display:flex; }
    .tiles { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:4px 0; }
    .tile { background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1); border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:24px 12px; cursor:pointer; min-height:130px; }
    .tile:active { opacity:0.7; }
    .tile-icon { font-size:40px; }
    .tile-label { font-size:15px; font-weight:700; color:#fff; text-align:center; }
    .tile-sub { font-size:11px; color:#666; text-align:center; }
    .tile.scan   { border-color:rgba(0,229,255,0.3);  background:rgba(0,229,255,0.06); }
    .tile.search { border-color:rgba(123,47,255,0.3); background:rgba(123,47,255,0.06); }
    .tile.low    { border-color:rgba(255,87,34,0.3);  background:rgba(255,87,34,0.06); }
    .tile.order  { border-color:rgba(0,200,83,0.3);   background:rgba(0,200,83,0.06); }
    .back-btn { background:none; border:none; color:#00e5ff; font-size:15px; font-weight:600; cursor:pointer; padding:4px 0 12px; text-align:left; }
    .search-input { width:100%; padding:16px; font-size:18px; border:1.5px solid rgba(255,255,255,0.15); border-radius:12px; background:rgba(255,255,255,0.07); color:#fff; margin-bottom:14px; -webkit-appearance:none; }
    .search-input:focus { outline:none; border-color:#00e5ff; }
    .part-card { background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px 16px; margin-bottom:10px; cursor:pointer; }
    .part-card:active { opacity:0.7; }
    .part-sku { font-size:11px; color:#666; margin-bottom:4px; }
    .part-desc { font-size:16px; font-weight:700; color:#fff; margin-bottom:4px; }
    .part-meta { display:flex; gap:12px; font-size:12px; flex-wrap:wrap; }
    .low-item { border-radius:12px; padding:14px 16px; margin-bottom:10px; }
    .low-item.zero { border:1.5px solid rgba(255,82,82,0.5); background:rgba(255,82,82,0.08); }
    .low-item.low  { border:1.5px solid rgba(255,214,0,0.5); background:rgba(255,214,0,0.06); }
    .scan-frame { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
    .scan-hint { font-size:14px; color:#888; text-align:center; line-height:1.6; padding:0 10px; }
    .scan-btn { width:100%; padding:20px; font-size:20px; font-weight:800; border:none; border-radius:14px; cursor:pointer; background:linear-gradient(135deg,#00e5ff,#7b2fff); color:#000; }
    .stop-btn { width:100%; padding:14px; font-size:16px; font-weight:700; border:none; border-radius:12px; cursor:pointer; background:rgba(255,255,255,0.1); color:#fff; display:none; }
    #qr-video-container { width:100%; max-width:300px; aspect-ratio:1; border-radius:16px; overflow:hidden; border:3px solid #00e5ff; background:#111; position:relative; }
    #qr-video-container video { width:100%; height:100%; object-fit:cover; }
    .field-label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; background:linear-gradient(90deg,#00e5ff,#e040fb); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    select, input[type="text"] { width:100%; padding:16px; font-size:18px; font-weight:600; border:1.5px solid rgba(255,255,255,0.15); border-radius:12px; background:rgba(255,255,255,0.07); color:#fff; -webkit-appearance:none; margin-bottom:14px; }
    select option { background:#111; color:#fff; }
    .submit-btn { width:100%; padding:20px; font-size:20px; font-weight:800; border:none; border-radius:14px; cursor:pointer; background:#2e7d32; color:#fff; }
    #msg { display:none; padding:14px; border-radius:12px; font-size:16px; font-weight:700; text-align:center; margin-top:12px; }
    #msg.success { background:rgba(0,200,83,0.15); border:2px solid #00c853; color:#00e676; display:block; }
    #msg.error   { background:rgba(255,23,68,0.15); border:2px solid #ff1744; color:#ff6e6e; display:block; }
    #msg.loading { background:rgba(0,229,255,0.10); border:2px solid #00e5ff; color:#00e5ff; display:block; }
    .empty { text-align:center; color:#555; font-size:15px; padding:40px 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-circle"><span class="logo-text">HK</span></div>
    <div class="brand">Hyper Karting</div>
  </div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="tiles">
      <div class="tile scan"   onclick="showPage('scan')">
        <div class="tile-icon">📷</div>
        <div class="tile-label">Scan QR</div>
        <div class="tile-sub">Take or restock</div>
      </div>
      <div class="tile search" onclick="showPage('search');loadParts('search');">
        <div class="tile-icon">🔍</div>
        <div class="tile-label">Search</div>
        <div class="tile-sub">Find a part</div>
      </div>
      <div class="tile low"    onclick="showPage('lowstock');loadParts('lowstock');">
        <div class="tile-icon">⚠️</div>
        <div class="tile-label">Low Stock</div>
        <div class="tile-sub">Needs attention</div>
      </div>
      <div class="tile order"  onclick="showPage('order')">
        <div class="tile-icon">📋</div>
        <div class="tile-label">Request Order</div>
        <div class="tile-sub">Flag for ordering</div>
      </div>
    </div>
  </div>

  <!-- SCAN -->
  <div class="page" id="page-scan">
    <button class="back-btn" onclick="stopScan();showPage('home')">← Back</button>
    <div class="scan-frame">
      <div id="qr-video-container">
        <video id="qr-video"></video>
      </div>
      <p class="scan-hint" id="scan-status">Tap Start — point camera at QR code</p>
      <button class="scan-btn" id="scan-btn" onclick="startScan()">📷 Start Scanner</button>
      <button class="stop-btn" id="stop-btn" onclick="stopScan()">✕ Stop</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="page" id="page-search">
    <button class="back-btn" onclick="showPage('home')">← Back</button>
    <input class="search-input" type="text" id="searchInput" placeholder="Search by name or SKU..." oninput="filterParts()" autocomplete="off">
    <div id="searchResults"><div class="empty">Loading parts...</div></div>
  </div>

  <!-- LOW STOCK -->
  <div class="page" id="page-lowstock">
    <button class="back-btn" onclick="showPage('home')">← Back</button>
    <div id="lowStockResults"><div class="empty">Loading...</div></div>
  </div>

  <!-- REQUEST ORDER -->
  <div class="page" id="page-order">
    <button class="back-btn" onclick="showPage('home')">← Back</button>
    <label class="field-label">Your Name</label>
    <select id="orderName">
      <option value="">— Select your name —</option>
      <option>Ross McArthur</option><option>Harvey Betts</option>
      <option>Rafael Hewitt</option><option>Alex Harper</option>
      <option>Sam Lally</option><option>Jayden Aginsky</option>
      <option>Will Webster</option><option>Christian Oom</option>
    </select>
    <label class="field-label">Part / SKU</label>
    <input type="text" id="orderPart" placeholder="e.g. Front Pad or 1381181">
    <label class="field-label">Notes (optional)</label>
    <input type="text" id="orderNotes" placeholder="e.g. urgent, qty needed...">
    <button class="submit-btn" onclick="submitOrder()">📋 Send Order Request</button>
    <div id="msg"></div>
  </div>
</div>

<script>
var APP = 'https://script.google.com/macros/s/AKfycbyC_Jj3rkosw79ICRDWme7YHJ8IvMTjD2KMqBkHF7WxfQhJvFqwFZpDydVZxQvSQYPD/exec';
var parts = [];
var qrScanner = null;

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/hk-inventory/sw.js').catch(function(){});

// Set correct height immediately
(function() {
  var app = document.querySelector('.app');
  app.style.height = window.innerHeight + 'px';
})();

function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  var pg = document.getElementById('page-'+id);
  pg.classList.add('active');
  pg.scrollTop = 0;
  // Force full screen recalculation
  var app = document.querySelector('.app');
  app.style.height = '';
  app.style.height = window.innerHeight + 'px';
}

// Keep height correct on resize/orientation change
window.addEventListener('resize', function() {
  var app = document.querySelector('.app');
  app.style.height = window.innerHeight + 'px';
});
window.addEventListener('orientationchange', function() {
  setTimeout(function() {
    var app = document.querySelector('.app');
    app.style.height = window.innerHeight + 'px';
  }, 300);
});

function jsonp(url, cb) {
  var fn = '_j' + Date.now();
  var done = false;
  var timeout = setTimeout(function() { if (!done) { done=true; cb(null); } }, 15000);
  window[fn] = function(d) {
    if (!done) { done=true; clearTimeout(timeout); cb(d); }
    delete window[fn];
    var s = document.getElementById(fn); if (s) s.remove();
  };
  var s = document.createElement('script');
  s.id = fn;
  s.src = url + '&callback=' + fn;
  s.onerror = function() { if (!done) { done=true; clearTimeout(timeout); cb(null); } };
  document.head.appendChild(s);
}

function loadParts(target) {
  if (parts.length > 0) { render(target); return; }
  // Try sessionStorage cache first
  var cached = sessionStorage.getItem('hk_parts');
  if (cached) {
    try { parts = JSON.parse(cached); render(target); return; } catch(e) {}
  }
  jsonp(APP + '?action=getparts', function(d) {
    if (!d) { setEl(target, '<div class="empty">Could not load. Check connection.</div>'); return; }
    parts = d;
    try { sessionStorage.setItem('hk_parts', JSON.stringify(d)); } catch(e) {}
    render(target);
  });
}
function setEl(t, h) { document.getElementById(t==='search'?'searchResults':'lowStockResults').innerHTML = h; }
function render(t) { t==='search' ? renderSearch('') : renderLow(); }
function filterParts() { renderSearch(document.getElementById('searchInput').value.toLowerCase()); }

function renderSearch(q) {
  var list = parts.filter(function(p){ return !q || p.desc.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q); });
  if (!list.length) { setEl('search','<div class="empty">No parts found</div>'); return; }
  var h = '';
  list.slice(0,60).forEach(function(p){
    var sc = p.qty==0?'#ff5252':p.qty<=p.reorder?'#ffd600':'#00e5ff';
    var st = p.qty==0?'🔴 Out of Stock':p.qty<=p.reorder?'🟡 Low: '+p.qty:'🟢 '+p.qty;
    h += '<div class="part-card" onclick="window.location.href=\''+APP+'?sku='+p.sku+'\'">'
      +'<div class="part-sku">SKU: '+p.sku+'</div>'
      +'<div class="part-desc">'+p.desc+'</div>'
      +'<div class="part-meta"><span style="color:'+sc+'">'+st+'</span>'
      +(p.loc?'<span style="color:#666">📍 '+p.loc+'</span>':'')+'</div></div>';
  });
  setEl('search', h);
}

function renderLow() {
  var list = parts.filter(function(p){ return p.qty<=p.reorder; }).sort(function(a,b){ return a.qty-b.qty; });
  if (!list.length) { setEl('lowstock','<div class="empty">✅ All stock levels are healthy!</div>'); return; }
  var h = '';
  list.forEach(function(p){
    var cls = p.qty==0?'zero':'low';
    var st  = p.qty==0?'🔴 Out of Stock':'🟡 Low — '+p.qty+' remaining';
    h += '<div class="low-item '+cls+'">'
      +'<div class="part-sku">SKU: '+p.sku+'</div>'
      +'<div class="part-desc">'+p.desc+'</div>'
      +'<div class="part-meta"><span>'+st+'</span>'
      +(p.loc?'<span style="color:#666;margin-left:12px">📍 '+p.loc+'</span>':'')+'</div></div>';
  });
  setEl('lowstock', h);
}

// ── QR Scanner using qr-scanner library ──
function startScan() {
  document.getElementById('scan-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'block';
  document.getElementById('scan-status').innerText = 'Starting camera...';

  var video = document.getElementById('qr-video');

  // Wait for QrScanner to load from module
  var attempts = 0;
  var waitForLib = setInterval(function() {
    attempts++;
    if (window.QrScanner) {
      clearInterval(waitForLib);
      try {
        qrScanner = new window.QrScanner(
          video,
          function(result) {
            var url = result.data || result;
            if (url) {
              stopScan();
              document.getElementById('scan-status').innerText = '✅ Found!';
              setTimeout(function(){ window.location.href = url; }, 200);
            }
          },
          {
            preferredCamera: 'environment',
            highlightScanRegion: true,
            highlightCodeOutline: true,
          }
        );
        qrScanner.start().then(function() {
          document.getElementById('scan-status').innerText = 'Point camera at QR code...';
        }).catch(function(err) {
          document.getElementById('scan-status').innerText = 'Camera denied. Go to Settings > Safari > Camera > Allow';
          document.getElementById('scan-btn').style.display = 'block';
          document.getElementById('stop-btn').style.display = 'none';
        });
      } catch(e) {
        document.getElementById('scan-status').innerText = 'Scanner error: ' + e.message;
        document.getElementById('scan-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
      }
    } else if (attempts > 50) {
      clearInterval(waitForLib);
      document.getElementById('scan-status').innerText = 'Scanner failed to load. Check connection.';
      document.getElementById('scan-btn').style.display = 'block';
      document.getElementById('stop-btn').style.display = 'none';
    }
  }, 100);
}

function stopScan() {
  if (qrScanner) { qrScanner.stop(); qrScanner.destroy(); qrScanner = null; }
  document.getElementById('scan-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('scan-status').innerText = 'Tap Start — point camera at QR code';
}

function submitOrder() {
  var name  = document.getElementById('orderName').value;
  var part  = document.getElementById('orderPart').value;
  var notes = document.getElementById('orderNotes').value;
  var msg   = document.getElementById('msg');
  if (!name) { msg.className='error'; msg.innerText='Please select your name'; return; }
  if (!part) { msg.className='error'; msg.innerText='Please enter a part or SKU'; return; }
  msg.className='loading'; msg.innerText='Sending...';
  jsonp(APP+'?action=requestorder&name='+encodeURIComponent(name)+'&part='+encodeURIComponent(part)+'&notes='+encodeURIComponent(notes), function(r) {
    if (r!==null) { msg.className='success'; msg.innerText='✅ Sent to Ross and Harvey!'; document.getElementById('orderPart').value=''; document.getElementById('orderNotes').value=''; }
    else { msg.className='error'; msg.innerText='❌ Failed. Try again.'; }
  });
}
</script>
</body>
</html>
